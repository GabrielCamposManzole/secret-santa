            </h3>

<div class="group">

</div>
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">E-mail</label>
<input class="w-full h-12 px-6 rounded-full border border-outline-variant bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface" type="email" value="ricardo.silva@email.com">
</div>
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Idade</label>
<input class="w-full h-12 px-6 rounded-full border border-outline-variant bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface" type="number" value="28">
</div>
</div>
</section>
<!-- Minhas Características -->

<h3 class="text-lg font-bold text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined">psychology</span>
                Minhas Características
            </h3>
<!-- Tip Box -->
<div class="bg-surface-container-highest rounded-xl p-4 flex gap-3 items-start border border-primary/10">
<span class="material-symbols-outlined text-primary">lightbulb</span>
<p class="text-xs text-on-surface-variant leading-relaxed">
                    Dica: Essas informações ajudam nas pistas para "A Missão" do Amigo Secreto!
                </p>
</div>
<div class="space-y-4">
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Cor do Cabelo</label>
<input class="w-full h-12 px-6 rounded-full border border-outline-variant bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface placeholder:text-outline" placeholder="Ex: Castanho, Loiro..." type="text">
</div>
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Tipo de Cabelo</label>

</div>
<div class="group">
