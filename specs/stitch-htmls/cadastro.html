<!DOCTYPE html><html lang="pt-br" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SecretSanta - Criar Conta</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#d42426',
            surface: '#f5f5f5',
            'surface-header': '#f8f9f9',
            'input-bg': '#e9e9e9',
            'label-text': '#72524e',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          borderRadius: {
            'full': '9999px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f5f5f5;
    }
    .input-shadow {
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
    }
    .btn-shadow {
      box-shadow: 0 10px 15px -3px rgba(212, 36, 38, 0.3), 0 4px 6px -4px rgba(212, 36, 38, 0.3);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen text-[#333]">
<!-- BEGIN: MainHeader -->
<header class="bg-surface-header py-6 px-6 border-b border-gray-100">
<div class="max-w-md mx-auto">
<h1 class="text-brand font-extrabold text-2xl tracking-tight">SecretSanta</h1>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: RegistrationForm -->
<main class="flex-grow flex flex-col items-center px-8 py-12 w-full max-w-md mx-auto">
<!-- Section Title -->
<div class="text-center mb-10" data-purpose="form-header">
<h2 class="text-3xl font-bold text-[#1a1a1a] mb-2">Criar Conta</h2>
<p class="text-[#72524e] font-medium">Junte-se à magia do amigo secreto.</p>
</div>
<form class="w-full space-y-5" data-purpose="register-form">
<!-- Field: Name -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-label-text uppercase tracking-wider ml-4">Nome Completo</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full bg-[#e9e9e9] border-none rounded-full py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-brand placeholder-gray-400 input-shadow" placeholder="Como quer ser chamado?" type="text">
</div>
</div>
<!-- Field: Age -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-label-text uppercase tracking-wider ml-4">Idade</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 21v-8a2 2 0 00-2-2H6a2 2 0 00-2 2v8m16 0H4m16 0a2 2 0 012 2v1H2v-1a2 2 0 012-2M12 11V7m0 0a2 2 0 110-4 2 2 0 010 4zm-5 4v-2m10 2v-2" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<input class="block w-full bg-[#e9e9e9] border-none rounded-full py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-brand placeholder-gray-400 input-shadow" placeholder="Sua idade" type="number">
</div>
</div>
<!-- Field: E-mail -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-label-text uppercase tracking-wider ml-4">E-mail</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full bg-[#e9e9e9] border-none rounded-full py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-brand placeholder-gray-400 input-shadow" placeholder="seu@email.com" type="email">
</div>
</div>
<!-- Field: Password -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-label-text uppercase tracking-wider ml-4">Senha</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full bg-[#f2f2f2] border-none rounded-full py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-brand placeholder-gray-400 input-shadow" placeholder="........." type="password">
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-brand text-white font-bold py-4 rounded-full flex items-center justify-center gap-2 btn-shadow active:scale-[0.98] transition-transform" type="submit"><span class="">Cadastrar</span></button>
</div>
</form>
<!-- Footer Redirect Link -->
<div class="mt-10 text-sm text-[#72524e] font-medium" data-purpose="login-redirect">
      Já tem uma conta? <a class="text-brand font-bold" href="#">Entre aqui</a>
</div>
</main>
<!-- END: RegistrationForm -->
<!-- BEGIN: SiteFooter -->
<footer class="bg-surface-header py-8 px-6 text-center mt-auto">
<p class="text-xs text-gray-400">© 2024 Secret Santa Editorial. All rights reserved.</p>
</footer>
<!-- END: SiteFooter -->


</body></html>
