<body class="font-body-md text-on-surface min-h-screen flex flex-col" style="background-color: rgb(245, 245, 245);">
<!-- TopAppBar -->
<header class="py-6 px-4 flex border-b border-gray-100 sticky top-0 z-50" style="background-color: rgb(248, 249, 249);">
<div class="flex items-center" data-purpose="logo">
<span class="text-primary font-extrabold text-2xl tracking-tighter font-heading">SecretSanta</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile pt-24 pb-32 max-w-md mx-auto w-full">
<!-- Welcome Section -->
<div class="mb-xl">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-xs">Bem-vindo de volta</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Entre para continuar sua jornada no The Quest.</p>
</div>
<!-- Login Form -->
<form class="space-y-lg" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-sm">
<label class="text-label-lg font-label-lg text-on-surface ml-base" for="email">E-mail</label>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full h-14 bg-secondary-container/50 border border-transparent rounded-full pl-14 pr-6 text-body-lg font-body-lg placeholder:text-on-surface-variant/50 transition-all focus:bg-surface focus:ring-0" id="email" placeholder="nome@exemplo.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center ml-base">
<label class="text-label-lg font-label-lg text-on-surface" for="password">Senha</label>
<a class="text-label-md font-label-md text-primary hover:underline" href="#">Esqueci minha senha</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full h-14 bg-secondary-container/50 border border-transparent rounded-full pl-14 pr-6 text-body-lg font-body-lg placeholder:text-on-surface-variant/50 transition-all focus:bg-surface focus:ring-0" id="password" placeholder="........" type="password">
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-full font-headline-sm text-headline-sm shadow-[0px_4px_12px_rgba(212,36,38,0.15)] active:scale-95 transition-all duration-200 mt-xl flex items-center justify-center">
                Entrar
            </button>
<!-- Sign Up Link -->
<div class="text-center pt-md">
<p class="text-body-md font-body-md text-on-surface-variant">
                    Não tem uma conta? <a class="text-primary font-bold hover:underline" href="#">Cadastre-se</a>
</p>
</div>
</form>
</main>
<!-- BottomNavBar (Suppressed for transactional/login but included as per prompt instruction) -->
<footer class="py-12 px-4 text-center border-t border-gray-100" style="background-color: rgb(248, 249, 249);">
<p class="text-slate-400 text-xs font-medium">
      © 2024 Secret Santa Editorial. All rights reserved.
    </p>
</footer>
<!-- Script for interaction feedback -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
