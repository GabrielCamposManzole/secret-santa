<!DOCTYPE html><html lang="pt-br"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Secret Santa - Discover</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              red: '#d42426',
              bg: '#f8f9f9',
              card: '#ffffff',
              gray: {
                light: '#e9ecef',
                text: '#6c757d'
              }
            }
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #f8f9f9;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .dashed-circle {
      border: 2px dashed #cbd5e1;
    }
    .progress-dot {
      height: 6px;
      border-radius: 999px;
      background-color: #d42426;
    }
    .progress-dot.active {
      width: 32px;
    }
    .progress-dot.inactive {
      width: 6px;
      opacity: 0.2;
    }
    .progress-dot.small {
      width: 6px;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- BEGIN: MainHeader -->
<header class="bg-[#f8f9f9] px-6 py-4 border-b border-gray-100 sticky top-0 z-50">
<div class="flex items-center">
<span class="text-brand-red font-extrabold text-xl tracking-tight">SecretSanta</span>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: GameContent -->
<main class="flex-grow px-6 py-8 flex flex-col items-center">
<!-- Hero Text -->
<div class="text-center mb-6" data-purpose="headline-section">
<h1 class="text-2xl font-extrabold text-slate-900 leading-tight">Descubra seu Amigo Secreto</h1>
<p class="text-slate-500 mt-2 text-sm">Revele as características uma a uma.</p>
</div>
<!-- Progress Dots -->
<div class="flex items-center justify-center gap-2 mb-8" data-purpose="progress-indicator">
<div class="progress-dot small"></div>
<div class="progress-dot small"></div>
<div class="progress-dot small"></div>
<div class="progress-dot active"></div>
<div class="progress-dot inactive"></div>
<div class="progress-dot inactive"></div>
</div>
<!-- Characteristic Card -->
<section class="bg-white rounded-[40px] shadow-sm border border-gray-100 w-full max-w-sm p-8 relative mb-10" data-purpose="characteristic-card">
<!-- Top Eye Icon (Abstract Decoration) -->
<div class="absolute top-6 right-8 opacity-20">
<svg class="text-slate-400" fill="none" height="48" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" viewBox="0 0 24 24" width="48" xmlns="http://www.w3.org/2000/svg">
<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
<circle cx="12" cy="12" r="3"></circle>
</svg>
</div>
<div class="text-center">
<span class="text-brand-red text-[11px] font-bold tracking-widest uppercase mb-2 block">Característica 4 de 5</span>
<h2 class="text-2xl font-bold text-slate-800 mb-10">Cor dos Olhos</h2>
<!-- Central Icon Area -->
<div class="flex justify-center mb-10">
<div class="dashed-circle w-32 h-32 rounded-full flex items-center justify-center bg-emerald-50 bg-opacity-30">
<div class="text-emerald-700">
<svg fill="none" height="48" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="48" xmlns="http://www.w3.org/2000/svg">
<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
<circle cx="12" cy="12" r="3"></circle>
</svg>
</div>
</div>
</div>
<!-- Result Value Box -->
<div class="bg-gray-100 rounded-2xl py-5 mb-4">
<span class="text-slate-800 font-bold text-lg">Castanhos</span>
</div>
<!-- Next Button -->
<button class="w-full bg-gray-200 hover:bg-gray-300 text-slate-800 font-bold py-5 rounded-2xl flex items-center justify-center transition-colors">
          Próxima Característica
          <svg class="h-4 w-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</button>
</div>
</section>
<!-- Final Guess Section -->
<div class="w-full max-w-sm" data-purpose="action-section">
<button class="w-full bg-brand-red hover:bg-red-700 text-white font-extrabold py-5 rounded-full flex items-center justify-center gap-2 shadow-lg shadow-red-200 transition-all active:scale-95">
        CHUTE FINAL
        <svg class="text-white" fill="currentColor" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
</svg>
</button>
<p class="text-[11px] text-slate-500 text-center mt-4 flex items-center justify-center gap-1">
<svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        Cuidado: você só tem uma chance no chute final!
      </p>
</div>
</main>
<!-- END: GameContent -->
<!-- BEGIN: AppFooter -->
<footer class="bg-[#f8f9f9] border-t border-gray-100 py-3 px-8 sticky bottom-0">
<nav class="flex justify-between items-center max-w-sm mx-auto">
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="bg-brand-red text-white p-3 rounded-2xl">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
</svg>
</div>
<span class="text-[10px] font-bold text-brand-red uppercase tracking-wider">Início</span>
</a>
<a class="flex flex-col items-center gap-2 opacity-50 hover:opacity-100 transition-opacity" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold text-slate-800 uppercase tracking-wider">Grupos</span>
</a>
<a class="flex flex-col items-center gap-2 opacity-50 hover:opacity-100 transition-opacity" href="#">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold text-slate-800 uppercase tracking-wider">Perfil</span>
</a>
</nav>
</footer>
<!-- END: AppFooter -->
</body></html>
