<!DOCTYPE html><html lang="pt-br"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Secret Santa - Resultado do Sorteio</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'yuletide-red': '#d42426',
            'yuletide-green': '#1e5f31',
            'surface': '#fff8f7',
            'surface-dim': '#f2d3cf',
            'surface-container-low': '#fff0ef',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          borderRadius: {
            'xl-custom': '2rem',
            '2xl-custom': '3rem',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8f9fa; /* Subtle backdrop like the image */
    }
    .shadow-card {
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="bg-gray-50 flex justify-center items-start min-h-screen">
<!-- BEGIN: MainContainer -->
<div class="w-full max-w-[448px] bg-white min-h-screen relative flex flex-col overflow-hidden" data-purpose="app-shell">
<!-- BEGIN: Header -->
<header class="pt-8 pb-4 px-8" data-purpose="main-header">
<h1 class="text-yuletide-red text-2xl font-extrabold tracking-tight">SecretSanta</h1>
</header>
<!-- END: Header -->
<!-- BEGIN: ContentArea -->
<main class="flex-1 px-6 pt-4 pb-24" data-purpose="game-result-container">
<!-- BEGIN: ResultCard -->
<div class="bg-white rounded-2xl-custom p-8 shadow-card border border-gray-100 flex flex-col items-center text-center" data-purpose="main-content-card">
<!-- Success Check Icon -->
<div class="w-20 h-20 bg-yuletide-green rounded-full flex items-center justify-center mb-6 shadow-lg shadow-green-900/20" data-purpose="success-icon">
<svg class="h-10 w-10 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<!-- Status Labels -->
<p class="text-yuletide-green font-bold text-xs tracking-[0.2em] uppercase mb-2">Sorteio Realizado</p>
<h2 class="text-gray-900 text-3xl font-extrabold mb-4">Você Acertou!</h2>
<p class="text-gray-500 text-sm leading-relaxed mb-8 max-w-[240px]">
          O momento que todos esperavam chegou. <br> Seu amigo secreto é:
        </p>
<!-- BEGIN: PersonRevealCard -->
<div class="w-full bg-gray-50 rounded-xl-custom py-10 px-6 flex flex-col items-center border border-gray-100" data-purpose="revealed-friend-card">
<!-- Avatar with Red Border -->
<div class="relative mb-4">
<div class="w-24 h-24 rounded-full border-[6px] border-yuletide-red p-1 flex items-center justify-center bg-white shadow-sm">
<div class="w-full h-full bg-gray-200 rounded-full flex items-center justify-center">
<!-- User Icon Placeholder -->
<svg class="h-10 w-10 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
</div>
<!-- Person Details -->
<h3 class="text-yuletide-red text-xl font-bold mb-1">Henrique Silva</h3>
<p class="text-gray-400 text-xs font-semibold tracking-wider">@HENRIQUE.SILVA</p>
</div>
<!-- END: PersonRevealCard -->
</div>
<!-- END: ResultCard -->
</main>
<!-- END: ContentArea -->
<!-- BEGIN: NavigationFooter -->
<nav class="fixed bottom-0 left-0 right-0 max-w-[448px] mx-auto bg-white border-t border-gray-100 px-8 py-4 rounded-t-2xl-custom shadow-[0_-5px_20px_rgba(0,0,0,0.03)] flex justify-between items-center z-50" data-purpose="bottom-navigation">
<!-- Nav Item: Início -->
<a class="flex flex-col items-center space-y-1 group" href="#">
<svg class="h-6 w-6 text-gray-400 group-hover:text-yuletide-red transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold text-gray-400 group-hover:text-yuletide-red">Início</span>
</a>
<!-- Nav Item: Grupos -->
<a class="flex flex-col items-center space-y-1 group" href="#">
<svg class="h-6 w-6 text-gray-400 group-hover:text-yuletide-red transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold text-gray-400 group-hover:text-yuletide-red">Grupos</span>
</a>
<!-- Nav Item: Perfil -->
<a class="flex flex-col items-center space-y-1 group" href="#">
<svg class="h-6 w-6 text-gray-400 group-hover:text-yuletide-red transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold text-gray-400 group-hover:text-yuletide-red">Perfil</span>
</a>
</nav>
<!-- END: NavigationFooter -->
</div>
<!-- END: MainContainer -->
</body></html>
