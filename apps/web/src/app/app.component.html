<div class="min-h-screen bg-surface flex flex-col items-center justify-center p-6 gap-10 font-['Plus_Jakarta_Sans']">

  <div class="text-center">
    <h1 class="text-4xl md:text-5xl font-bold text-secondary tracking-tight">
      Secret<span class="text-primary">Santa</span>
    </h1>
    <p class="mt-3 text-lg text-gray-600">Teste de Interface e Design Tokens</p>
  </div>

  <div class="flex flex-wrap justify-center gap-4">
    <app-button variant="primary">Sortear Agora</app-button>
    <app-button variant="secondary">Ver Grupos</app-button>
    <app-button variant="outline">Meu Perfil</app-button>
    <app-save-button [label]="'Salvar Alterações'"></app-save-button>
  </div>

  <div class="card w-full max-w-md bg-white shadow-xl rounded-2xl border border-gray-100">
    <div class="card-body items-center text-center">
      <h2 class="card-title text-[#1A1C1C]">Tokens Aplicados</h2>
      <p class="text-sm text-gray-500">
        Cores: #D42426 e #1A1C1C<br>
        Bordas: rounded-full (Pílula)<br>
        Fonte: Plus Jakarta Sans
      </p>
    </div>
  </div>

</div>
