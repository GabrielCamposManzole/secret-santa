@if (isLandingPage()) {
  <router-outlet />
} @else if (isAuthPage()) {
  <div class="min-h-screen flex justify-center items-center md:py-12 p-0 sm:p-4">
    <div class="w-full max-w-[480px] bg-white min-h-screen md:min-h-0 md:rounded-[32px] relative flex flex-col overflow-hidden md:shadow-xl md:border md:border-gray-100/50">
      <router-outlet />
    </div>
  </div>
} @else {
  <div class="min-h-screen flex flex-col md:flex-row">
    <!-- Desktop Sidebar (Navigation & Profile) -->
    <aside class="hidden md:flex w-72 bg-white border-r border-gray-100 flex-col shrink-0 sticky top-0 h-screen p-8 justify-between">
      <div class="space-y-8">
        <!-- Logo -->
        <div class="flex items-center px-4" data-purpose="logo">
          <span class="text-[#D42426] font-extrabold text-2xl tracking-tighter font-heading">SecretSanta</span>
        </div>

        <!-- User Profile Info Card -->
        @if (authService.currentUser(); as user) {
          <div class="flex items-center gap-3.5 p-4 bg-gray-50 rounded-2xl border border-gray-100">
            <div class="w-11 h-11 bg-[#D42426] text-white rounded-full flex items-center justify-center font-bold text-base shadow-sm">
              {{ getInitials(user.nome_completo) }}
            </div>
            <div class="min-w-0">
              <p class="text-gray-900 font-bold text-sm truncate font-heading">{{ user.nome_completo }}</p>
              <p class="text-gray-400 text-xs truncate font-body">{{ user.email }}</p>
            </div>
          </div>
        }

        <!-- Navigation -->
        <nav class="space-y-2">
          <a
            routerLink="/sorteios"
            routerLinkActive="bg-red-50 text-[#D42426] font-bold"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex items-center gap-3.5 px-4 py-3 rounded-full text-gray-500 hover:bg-gray-50 hover:text-[#D42426] transition-colors text-sm font-semibold font-body"
          >
            <span class="material-symbols-outlined text-[22px]">group</span>
            <span>Meus Grupos</span>
          </a>
          <a
            routerLink="/perfil"
            routerLinkActive="bg-red-50 text-[#D42426] font-bold"
            class="flex items-center gap-3.5 px-4 py-3 rounded-full text-gray-500 hover:bg-gray-50 hover:text-[#D42426] transition-colors text-sm font-semibold font-body"
          >
            <span class="material-symbols-outlined text-[22px]">person</span>
            <span>Meu Perfil</span>
          </a>
        </nav>
      </div>

      <!-- Logout -->
      <button
        (click)="logout()"
        class="flex items-center gap-3.5 px-4 py-3.5 rounded-full text-gray-500 hover:bg-red-50 hover:text-red-600 transition-colors text-sm font-bold w-full text-left font-body"
      >
        <span class="material-symbols-outlined text-[22px]">logout</span>
        <span>Sair da Conta</span>
      </button>
    </aside>

    <!-- Main View Panel -->
    <div class="flex-grow flex flex-col min-h-screen">
      <div class="w-full min-h-screen relative flex flex-col overflow-hidden md:overflow-visible transition-all">
        <router-outlet />
      </div>
    </div>
  </div>
}
