@if (isAuthPage()) {
  <div class="min-h-screen flex justify-center items-center md:py-12 p-0 sm:p-4">
    <div class="w-full max-w-[480px] bg-white min-h-screen md:min-h-0 md:rounded-[32px] relative flex flex-col overflow-hidden md:shadow-xl md:border md:border-gray-100/50">
      <router-outlet />
    </div>
  </div>
} @else {
  <div class="min-h-screen flex flex-col">
    <app-header />

    <main class="flex-grow flex flex-col w-full">
      <router-outlet />
    </main>

    <!-- Desktop footer for all non-auth pages -->
    <app-footer class="hidden md:block" />

    <!-- Mobile bottom nav only for authenticated users -->
    @if (isLoggedPage()) {
      <app-bottom-nav />
    }
  </div>
}
