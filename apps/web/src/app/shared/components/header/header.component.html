<header class="bg-white border-b border-gray-100 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center">
      <span class="text-[#D42426] font-extrabold text-2xl tracking-tighter">SecretSanta</span>
    </a>

    <!-- Navigation Links -->
    <nav class="hidden md:flex items-center space-x-8">
      <a 
        routerLink="/" 
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="text-[#D42426] font-bold"
        class="text-gray-500 hover:text-gray-900 transition-colors font-semibold"
      >
        Início
      </a>
      
      @if (isLoggedIn()) {
        <a 
          routerLink="/sorteios" 
          routerLinkActive="text-[#D42426] font-bold"
          class="text-gray-500 hover:text-gray-900 transition-colors font-semibold"
        >
          Grupos
        </a>
        <a 
          routerLink="/perfil" 
          routerLinkActive="text-[#D42426] font-bold"
          class="text-gray-500 hover:text-gray-900 transition-colors font-semibold"
        >
          Perfil
        </a>
      }
    </nav>

    <!-- Right Side Actions -->
    <div class="flex items-center gap-4">
      @if (isLoggedIn()) {
        <!-- User Dropdown -->
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar hover:bg-gray-100">
            <div class="w-10 h-10 rounded-full bg-[#D42426] text-white flex items-center justify-center font-bold text-sm shadow-sm select-none">
              {{ getInitials(authService.currentUser()?.nome_completo) }}
            </div>
          </div>
          <ul
            tabindex="0"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[100] mt-3 w-56 p-2 shadow-lg border border-gray-100"
          >
            <li class="px-4 py-2 border-b border-gray-100 mb-1 select-none">
              <p class="font-bold text-gray-800 text-sm leading-tight truncate">
                {{ authService.currentUser()?.nome_completo }}
              </p>
              <p class="text-xs text-gray-500 truncate mt-0.5">
                {{ authService.currentUser()?.email }}
              </p>
            </li>
            <li>
              <a routerLink="/sorteios" class="justify-between py-2.5">
                Meus Grupos
              </a>
            </li>
            <li><a routerLink="/perfil" class="py-2.5">Meu Perfil</a></li>
            <div class="divider my-1"></div>
            <li>
              <button (click)="logout()" class="text-red-600 hover:bg-red-50 font-semibold py-2.5">
                Sair
              </button>
            </li>
          </ul>
        </div>
      } @else {
        <!-- Logged Out Button -->
        <a 
          routerLink="/login" 
          class="bg-black text-white px-6 py-2.5 rounded-full font-bold text-sm md:text-base hover:opacity-90 transition-opacity"
        >
          Entrar
        </a>
      }
    </div>
  </div>
</header>
