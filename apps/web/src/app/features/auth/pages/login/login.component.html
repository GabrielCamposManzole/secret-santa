<!-- TopAppBar -->
<header class="py-6 px-4 flex border-b border-gray-100 bg-[#f8f9f9] justify-between items-center w-full md:hidden">
  <div class="flex items-center" data-purpose="logo">
    <span class="text-[#D42426] font-extrabold text-2xl tracking-tighter font-heading">SecretSanta</span>
  </div>
</header>

<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-5 pt-12 pb-20 w-full md:p-8">
  <!-- Desktop Logo -->
  <div class="hidden md:flex items-center justify-center mb-8" data-purpose="logo-desktop">
    <span class="text-[#D42426] font-extrabold text-3xl tracking-tighter font-heading">SecretSanta</span>
  </div>

  <!-- Welcome Section -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-1 font-heading">Bem-vindo de volta</h1>
    <p class="text-sm text-gray-500 font-body">Entre para continuar sua jornada no The Quest.</p>
  </div>

  <!-- Error Alert -->
  @if (errorMessage()) {
    <div class="p-4 mb-6 text-sm text-white bg-red-600 rounded-full flex items-center justify-between shadow-md">
      <span class="font-medium px-4">{{ errorMessage() }}</span>
      <button (click)="errorMessage.set(null)" class="text-white hover:text-gray-200 focus:outline-none pr-4">
        ✕
      </button>
    </div>
  }

  <!-- Login Form -->
  <form (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Email Field -->
    <div class="space-y-2">
      <label class="text-sm font-semibold text-gray-700 ml-4 font-body" for="email">E-mail</label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-gray-400 group-focus-within:text-[#D42426] transition-colors">mail</span>
        </div>
        <input
          class="w-full h-14 bg-gray-100 border border-transparent rounded-full pl-14 pr-6 text-base font-body placeholder:text-gray-400 transition-all focus:bg-white focus:border-[#D42426] focus:ring-2 focus:ring-[#D42426]/20 focus:outline-none"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="nome@exemplo.com"
          type="email"
          required
        />
      </div>
    </div>

    <!-- Password Field -->
    <div class="space-y-2">
      <div class="flex justify-between items-center ml-4">
        <label class="text-sm font-semibold text-gray-700 font-body" for="password">Senha</label>
        <a class="text-xs font-semibold text-[#D42426] hover:underline" routerLink="/recuperar-senha">Esqueci minha senha</a>
      </div>
      <div class="relative group">
        <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-gray-400 group-focus-within:text-[#D42426] transition-colors">lock</span>
        </div>
        <input
          class="w-full h-14 bg-gray-100 border border-transparent rounded-full pl-14 pr-6 text-base font-body placeholder:text-gray-400 transition-all focus:bg-white focus:border-[#D42426] focus:ring-2 focus:ring-[#D42426]/20 focus:outline-none"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="........"
          type="password"
          required
        />
      </div>
    </div>

    <!-- CTA Button -->
    <button
      type="submit"
      [disabled]="isLoading()"
      class="w-full h-14 bg-[#D42426] text-white rounded-full font-semibold text-base shadow-[0px_4px_12px_rgba(212,36,38,0.15)] active:scale-95 hover:bg-[#b01e20] disabled:bg-gray-400 disabled:cursor-not-allowed transition-all duration-200 mt-8 flex items-center justify-center font-heading"
    >
      @if (isLoading()) {
        <span class="loading loading-spinner loading-md"></span>
      } @else {
        Entrar
      }
    </button>

    <!-- Sign Up Link -->
    <div class="text-center pt-4">
      <p class="text-sm text-gray-500 font-body">
        Não tem uma conta?
        <a class="text-[#D42426] font-bold hover:underline" routerLink="/cadastro">Cadastre-se</a>
      </p>
    </div>
  </form>
</main>

<!-- BottomNavBar -->
<footer class="py-12 px-4 text-center border-t border-gray-100 bg-[#f8f9f9] mt-auto md:hidden">
  <p class="text-gray-400 text-xs font-medium">
    © 2024 Secret Santa Editorial. All rights reserved.
  </p>
</footer>
